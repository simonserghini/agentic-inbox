<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c0e"/>
      <stop offset="50%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#0c0c0e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f6821f" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f6821f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f6821f" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f6821f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f6821f" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <circle cx="980" cy="120" r="220" fill="url(#orb)"/>
  <circle cx="180" cy="520" r="160" fill="url(#orb)"/>

  <!-- grid dots -->
  <g fill="#ffffff" opacity="0.04">
    <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/>
    <circle cx="960" cy="550" r="2"/><circle cx="1040" cy="550" r="2"/><circle cx="1120" cy="550" r="2"/>
  </g>

  <!-- mock window -->
  <g filter="url(#shadow)" transform="translate(620 130)">
    <rect width="480" height="340" rx="14" fill="#16161a" stroke="#2a2a32" stroke-width="1.5"/>
    <rect width="480" height="36" rx="14" fill="#1e1e24"/>
    <rect y="22" width="480" height="14" fill="#1e1e24"/>
    <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="18" r="5" fill="#febc2e"/>
    <circle cx="54" cy="18" r="5" fill="#28c840"/>
    <!-- sidebar -->
    <rect x="0" y="36" width="110" height="304" fill="#141418"/>
    <rect x="14" y="56" width="82" height="22" rx="6" fill="rgba(246,130,31,0.2)"/>
    <rect x="14" y="88" width="62" height="14" rx="4" fill="#2a2a32"/>
    <rect x="14" y="110" width="72" height="14" rx="4" fill="#2a2a32"/>
    <!-- emails -->
    <rect x="126" y="56" width="180" height="52" rx="8" fill="#1e1e24"/>
    <rect x="140" y="72" width="90" height="10" rx="3" fill="#ececef"/>
    <rect x="140" y="90" width="130" height="8" rx="3" fill="#8b8b96"/>
    <rect x="126" y="118" width="180" height="52" rx="8" fill="#16161a" stroke="#2a2a32"/>
    <rect x="140" y="134" width="70" height="10" rx="3" fill="#8b8b96"/>
    <rect x="140" y="152" width="120" height="8" rx="3" fill="#555"/>
    <!-- agent panel -->
    <rect x="320" y="56" width="146" height="270" rx="8" fill="#141418" stroke="#2a2a32"/>
    <rect x="334" y="72" width="50" height="8" rx="3" fill="#f6821f"/>
    <rect x="334" y="96" width="118" height="36" rx="8" fill="rgba(40,200,64,0.12)" stroke="rgba(40,200,64,0.25)"/>
    <rect x="346" y="108" width="90" height="6" rx="2" fill="#5dd879"/>
    <rect x="334" y="144" width="118" height="48" rx="8" fill="#1e1e24"/>
    <rect x="346" y="158" width="94" height="6" rx="2" fill="#8b8b96"/>
    <rect x="346" y="172" width="72" height="6" rx="2" fill="#555"/>
  </g>

  <!-- envelope icon -->
  <g transform="translate(88 200)">
    <rect width="88" height="88" rx="20" fill="rgba(246,130,31,0.12)" stroke="rgba(246,130,31,0.35)" stroke-width="1.5"/>
    <path d="M24 34h40q4 0 4 4v28q0 4-4 4H24q-4 0-4-4V38q0-4 4-4Zm0 0 20 16 20-16" fill="none" stroke="#f6821f" stroke-width="3.5" stroke-linejoin="round"/>
  </g>

  <!-- text -->
  <text x="88" y="340" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="64" font-weight="700" fill="#ececef" letter-spacing="-2">
    Agentic Inbox
  </text>
  <text x="88" y="400" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="30" font-weight="400" fill="#8b8b96">
    Your inbox, with an AI agent built in
  </text>

  <!-- tags -->
  <g transform="translate(88 440)">
    <rect width="148" height="36" rx="18" fill="#1e1e24" stroke="#2a2a32"/>
    <text x="74" y="24" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="500" fill="#f6821f">Cloudflare Workers</text>
  </g>
  <g transform="translate(248 440)">
    <rect width="108" height="36" rx="18" fill="#1e1e24" stroke="#2a2a32"/>
    <text x="54" y="24" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="500" fill="#8b8b96">Self-hosted</text>
  </g>
  <g transform="translate(368 440)">
    <rect width="96" height="36" rx="18" fill="#1e1e24" stroke="#2a2a32"/>
    <text x="48" y="24" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="500" fill="#8b8b96">AI Agent</text>
  </g>

  <!-- domain -->
  <text x="88" y="580" font-family="ui-monospace,Menlo,monospace" font-size="18" fill="#555">agenticinbox.serghini.me</text>
</svg>